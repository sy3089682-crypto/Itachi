name: omnilinux_mobile
description: Universal Linux Runtime for Smartphones - Native Android App
version: 3.5.0+1
publish_to: none

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Terminal emulation
  xterm: ^4.0.0
  
  # State management
  provider: ^6.1.2
  
  # File system & storage
  path_provider: ^2.1.3
  objectbox: ^4.0.0
  objectbox_flutter_libs: any
  
  # Encryption
  libsodium: ^0.2.1
  
  # Network & WebRTC
  webrtc: ^0.11.0
  
  # Process execution
  process_run: ^1.1.0
  
  # Device info
  device_info_plus: ^10.1.0
  battery_plus: ^6.0.0
  
  # Thermal monitoring (Android only)
  android_thermal: ^1.0.0
  
  # Archive extraction (rootfs)
  archive: ^3.6.1
  
  # HTTP client (downloads)
  http: ^1.2.1
  
  # Permissions
  permission_handler: ^11.3.1
  
  # Preferences
  shared_preferences: ^2.2.3
  
  # Utilities
  collection: ^1.18.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  
  assets:
    - assets/bin/
    - assets/rootfs/
    - assets/configs/
    - assets/seccomp/
    
  fonts:
    - family: HackerMono
      fonts:
        - asset: assets/fonts/Hack-Regular.ttf
