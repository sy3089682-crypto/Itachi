# OMNILINUX MOBILE - LiveKit SFU Kubernetes Deployment
# Phase 4: Cloud Infrastructure

apiVersion: v1
kind: Namespace
metadata:
  name: omnilinux-sfu
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit-sfu
  namespace: omnilinux-sfu
  labels:
    app: livekit-sfu
spec:
  replicas: 3
  selector:
    matchLabels:
      app: livekit-sfu
  template:
    metadata:
      labels:
        app: livekit-sfu
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
      - name: livekit
        image: livekit/livekit-server:latest
        ports:
        - containerPort: 7880
          name: http
        - containerPort: 7881
          name: rtc-tcp
        - containerPort: 7882
          name: rtc-udp
          protocol: UDP
        env:
        - name: LIVEKIT_CONFIG
          valueFrom:
            configMapKeyRef:
              name: livekit-config
              key: config.yaml
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: livekit-sfu-service
  namespace: omnilinux-sfu
spec:
  selector:
    app: livekit-sfu
  ports:
  - name: http
    port: 7880
    targetPort: http
  - name: rtc-tcp
    port: 7881
    targetPort: rtc-tcp
  - name: rtc-udp
    port: 7882
    targetPort: rtc-udp
    protocol: UDP
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: livekit-hpa
  namespace: omnilinux-sfu
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: livekit-sfu
  minReplicas: 3
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
